<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Portal</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:Arial, Helvetica, sans-serif;

            background:#f4f4f4;

            padding:30px;

        }

        h1{

            text-align:center;

            color:#0d6efd;

            margin-bottom:25px;

        }

        .controls{

            display:flex;

            justify-content:center;

            gap:20px;

            margin-bottom:25px;

            flex-wrap:wrap;

        }

        input{

            padding:10px;

            width:250px;

            font-size:16px;

        }

        button{

            padding:10px 20px;

            background:#0d6efd;

            color:white;

            border:none;

            border-radius:5px;

            cursor:pointer;

        }

        button:hover{

            background:#0b5ed7;

        }

        .course-grid{

            display:grid;

            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

            gap:20px;

        }

        .course-card{

            background:white;

            padding:20px;

            border-radius:10px;

            box-shadow:0px 2px 8px rgba(0,0,0,0.2);

            cursor:pointer;

            min-height:220px;

        }

        .course-card h2{

            color:#0d6efd;

            margin-bottom:15px;

        }

        .course-card p{

            margin:8px 0;

        }

        #total-credits{

            margin-top:30px;

            text-align:center;

            font-size:22px;

            font-weight:bold;

        }

        #selected-course{

            margin-top:20px;

            text-align:center;

            font-size:20px;

            color:#198754;

            font-weight:bold;

        }

    </style>

</head>

<body>

<h1>Student Portal</h1>

<div class="controls">

<input
type="text"
id="search-courses"
placeholder="Search courses..."
>

<button id="sort-btn">

Sort by Credits

</button>

</div>

<div class="course-grid">

</div>

<p id="total-credits"></p>

<div id="selected-course">

Click a Course Card

</div>

<script type="module" src="app.js"></script>

</body>

</html>
