<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>

    <style>

        body{
            font-family:Arial, Helvetica, sans-serif;
            background:#f4f4f4;
            margin:30px;
        }

        h1{
            text-align:center;
        }

        .course-grid{

            display:grid;

            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

            gap:20px;

            margin-top:30px;

        }

        .course-card{

            background:white;

            padding:20px;

            border-radius:10px;

            box-shadow:0px 2px 8px rgba(0,0,0,0.2);

        }

        .course-card h2{

            color:#0d6efd;

    margin-bottom:10px;

}

.course-card p{

    margin:8px 0;

}

        #total-credits{

            margin-top:30px;

            font-size:22px;

            font-weight:bold;

            text-align:center;

        }

    </style>

</head>

<body>

<h1>Student Portal</h1>

<!-- Empty Grid -->

<div class="course-grid">

</div>

<p id="total-credits"></p>

<script type="module" src="app.js"></script>

</body>

</html>
