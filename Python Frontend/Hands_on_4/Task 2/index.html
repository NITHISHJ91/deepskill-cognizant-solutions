<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fetch API - Task 2</title>

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

}

body{

font-family:Arial, Helvetica, sans-serif;

background:#f4f4f4;

padding:30px;

}

h1{

text-align:center;

color:#0d6efd;

margin-bottom:30px;

}

#loading{

text-align:center;

font-size:22px;

color:#0d6efd;

margin-bottom:20px;

}

#error{

text-align:center;

font-size:20px;

color:red;

margin:20px;

}

#retry-btn{

display:none;

margin:20px auto;

padding:10px 20px;

background:#0d6efd;

color:white;

border:none;

border-radius:5px;

cursor:pointer;

}

#retry-btn:hover{

background:#084298;

}

#notifications{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(300px,1fr));

gap:20px;

}

.notification{

background:white;

padding:20px;

border-radius:10px;

box-shadow:0px 2px 8px rgba(0,0,0,.2);

}

.notification h3{

color:#0d6efd;

margin-bottom:10px;

}

</style>

</head>

<body>

<h1>Notifications</h1>

<p id="loading">Loading...</p>

<p id="error"></p>

<button id="retry-btn">Retry</button>

<section id="notifications"></section>

<script src="app.js"></script>

</body>

</html>
