<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hands-On 4 Task 1</title>

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

}

body{

font-family:Arial, Helvetica, sans-serif;

background:#f4f4f4;

padding:30px;

}

h1{

text-align:center;

color:#0d6efd;

margin-bottom:30px;

}

#loading{

font-size:22px;

text-align:center;

color:red;

margin-bottom:20px;

}

.course-grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:20px;

}

.course-card{

background:white;

padding:20px;

border-radius:10px;

box-shadow:0px 2px 8px rgba(0,0,0,.2);

}

.course-card h2{

color:#0d6efd;

margin-bottom:10px;

}

</style>

</head>

<body>

<h1>Student Portal</h1>

<p id="loading">Loading courses...</p>

<div class="course-grid"></div>

<script type="module" src="app.js"></script>

</body>

</html>
